<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Login</title>

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="login-container">

        <!-- Profile Circle -->
        <div class="profile-circle">
            <i class="fa-regular fa-user"></i>
        </div>

        <!-- Login Box -->
        <div class="login-box">

            <form id="loginForm">

                <!-- Username -->
                <div class="input-box">

                    <div class="icon">
                        <i class="fa-solid fa-user"></i>
                    </div>

                    <input
                        type="text"
                        id="username"
                        placeholder="6 Digit User ID"
                        maxlength="6"
                        required>

                </div>
                

                <!-- Password -->
                <div class="input-box">

    <div class="icon">
        <i class="fa-solid fa-lock"></i>
    </div>
    <input
        type="password"
        id="password"
        placeholder="Password"
        required>

    <div class="eye-icon" id="togglePassword">
        <i class="fa-solid fa-eye"></i>
    </div>

</div>

                <!-- Options -->
                <div class="options">

                    <label>
                        <input type="checkbox">
                        Remember me
                    </label>

                    <a href="#">
                        Forgot Password?
                    </a>

                </div>

                <!-- Button -->
                <button type="submit" class="login-btn">
                    LOGIN
                </button>

            </form>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>

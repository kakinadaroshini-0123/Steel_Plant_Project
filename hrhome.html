<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>HR Dashboard</title>

    <link rel="stylesheet"
          href="hrhome.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

    <!-- BACKGROUND -->

    <div class="bg1"></div>
    <div class="bg2"></div>

    <!-- SIDEBAR -->

    <div class="sidebar"
         id="sidebar">

        <div class="sidebar-top">

            <h2>
                MENU
            </h2>

            <button id="closeMenu">

                <i class="fa-solid fa-xmark"></i>

            </button>

        </div>

        <div class="menu-items">

            <button onclick="showDashboard()">

                <i class="fa-solid fa-house"></i>

                Dashboard

            </button>

        </div>

        <button class="logout-btn"
                onclick="logout()">

            <i class="fa-solid fa-right-from-bracket"></i>

            Logout

        </button>

    </div>

    <!-- MAIN -->

    <div class="main-container">

        <!-- TOP BAR -->

        <div class="top-bar">

            <button id="menuButton">

                <i class="fa-solid fa-bars"></i>

            </button>

            <h1>
                STEEL PLANT (HR)
            </h1>

        </div>

        <!-- CONTENT -->

        <div class="content"
             id="content">

            <div class="dashboard-box">

                <h2>
                    LOGIN SUCCESSFUL
                </h2>

                <p id="employeeText">

                </p>

            </div>

        </div>

    </div>

    <script src="hrhome.js"></script>

</body>

</html>

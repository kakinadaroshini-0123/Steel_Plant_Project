<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Details</title>
  <link rel="stylesheet" href="employeeDetails.css">
</head>
<body>
  <div class="page-shell">
    <div class="page-heading">
      <h1>Employee Details</h1>
      <p>Review all employees and their current status.</p>
    </div>
    <div class="table-panel">
      <table>
        <thead>
          <tr>
            <th>Employee ID</th>
            <th>Name</th>
            <th>Department</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="employeeTable"></tbody>
      </table>
    </div>
  </div>
  <script src="employeeDetails.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Dashboard</title>
  <link rel="stylesheet" href="employeeDashboard.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
  <div class="dashboard-shell">
    <aside class="sidebar">
      <div class="brand-panel">
        <div class="logo-icon"><i class="fa-solid fa-industry"></i></div>
        <div>
          <h2>Steel Plant</h2>
          <p>Employee Portal</p>
        </div>
      </div>
      <div class="user-card">
        <div class="avatar"><i class="fa-solid fa-user"></i></div>
        <div>
          <h3 id="username">Employee</h3>
          <p>Employee</p>
        </div>
      </div>
      <nav class="nav-list">
        <button class="nav-item active" data-page="dashboard.html"><i class="fa-solid fa-chart-line"></i>Dashboard</button>
        <button class="nav-item" data-page="profile.html"><i class="fa-solid fa-user"></i>Profile</button>
        <button class="nav-item" data-page="attendance.html"><i class="fa-solid fa-calendar-check"></i>Attendance</button>
        <button class="nav-item" data-page="leaveRequest.html"><i class="fa-solid fa-file-lines"></i>Leave Request</button>
        <button class="nav-item" data-page="employeeLeaveStatus.html">Leave Status</button>
        <button class="nav-item logout-btn"><i class="fa-solid fa-right-from-bracket"></i>Logout</button>
      </nav>
    </aside>
    <main class="workspace">
      <header class="workspace-header">
        <div>
          
        </div>
      </header>
      <section class="workspace-content">
        <iframe id="frame" src="dashboard.html"></iframe>
      </section>
    </main>
  </div>
  <script src="employeeDashboard.js"></script>
</body>
</html>

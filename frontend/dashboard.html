<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Home</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <main class="home-shell">
    <section class="hero-card">
      <div>
        <p>Employee Dashboard</p>
        <h1>Welcome to the Smart Steel Plant platform</h1>
        <span>Track attendance, submit leaves, and update your profile with ease.</span>
      </div>
    </section>
    <section class="summary-grid">
      <article class="summary-card">
        <h3>Attendance Records</h3>
        <p id="attendanceCount">Loading...</p>
      </article>
      <article class="summary-card">
        <h3>Pending Leaves</h3>
        <p id="pendingLeaves">Loading...</p>
      </article>
      <article class="summary-card">
        <h3>Profile Status</h3>
        <p id="profileStatus">Loading...</p>
      </article>
    </section>
  </main>
  <script src="dashboard.js"></script>
</body>
</html>

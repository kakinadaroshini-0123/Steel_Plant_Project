<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Profile</title>

<link rel="stylesheet" href="profile.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="profile-card">

  <div class="right-side">

    <!-- TOP CARD -->
    <div class="profile-top-card">

      <div class="profile-top-left">

        <div class="top-icon">
          <i class="fa-solid fa-user"></i>
        </div>

        <div class="top-user-details">
          <h2 id="top_name"></h2>
          <p>Employee Profile</p>
        </div>

      </div>

      <div class="profile-top-right">

        <h2 id="top_id"></h2>
        <p>Employee ID</p>

        <span class="status-badge active">Active</span>

      </div>

    </div>

    <!-- FORM -->
    <div class="form-grid">

      <div>
        <label>Employee ID</label>
        <input type="text" id="employee_id" readonly>
      </div>

      <div>
        <label>Name</label>
        <input type="text" id="full_name" readonly>
      </div>

      <div>
        <label>Department</label>
        <input type="text" id="department_input" readonly>
      </div>

      <div>
        <label>Phone</label>
        <input type="text" id="phone" readonly>
      </div>

      <div>
        <label>Email</label>
        <input type="email" id="email" readonly>
      </div>

      <div>
        <label>Shift</label>
        <input type="text" id="shift_name" readonly>
      </div>

      <div>
        <label>Blood Group</label>
        <input type="text" id="blood_group" readonly>
      </div>

      <div>
        <label>Emergency Contact</label>
        <input type="text" id="emergency_contact" readonly>
      </div>

      <div class="address-field">
        <label>Address</label>
        <textarea id="address" readonly></textarea>
      </div>

    </div>

  </div>

</div>

<script src="profile.js"></script>

</body>
</html>
